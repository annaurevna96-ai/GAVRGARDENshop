<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>Магазин растений - ГАВРСАД</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #2d5a27;
            text-transform: uppercase;
            cursor: pointer;
        }
        .logo span { font-weight: 700; color: #2d5a27; }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a {
            text-decoration: none;
            color: #4a4a4a;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #8bc34a; }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-icon img { width: 22px; filter: grayscale(1); }
        
        #cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #ef4444;
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 50%;
        }

        .burger-menu {
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 25px;
            cursor: pointer;
        }
        .burger-menu span { display: block; height: 2px; width: 100%; background-color: #2d5a27; }

        /* ОБЩИЕ СТИЛИ МОДАЛОК */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 2000;
            backdrop-filter: blur(2px);
        }

        /* КАРТОЧКА ТОВАРА */
        #product-modal .modal-content-wrapper {
            background: white;
            width: 95%;
            max-width: 850px;
            max-height: 85vh; /* Ограничение высоты */
            margin: auto;
            border-radius: 8px;
            position: relative;
            overflow-y: auto; /* Прокрутка внутри */
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* КОРЗИНА */
        #cart-modal .cart-panel {
            background: white;
            width: 100%;
            max-width: 450px;
            height: 100%;
            margin-left: auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #cart-items {
            overflow-y: auto;
            flex-grow: 1;
        }

        /* КНОПКИ ЗАКРЫТИЯ */
        .close-btn {
            position: sticky;
            top: 0;
            right: 0;
            float: right;
            z-index: 2100;
            background: white;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #999;
            cursor: pointer;
        }
        .close-btn:hover { color: #000; }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: white;
                padding: 20px 0;
                box-shadow: 0 10px 15px rgba(0,0,0,0.05);
                text-align: center;
            }
            .nav-links.active { display: flex; }
            .burger-menu { display: flex; }
            #product-modal .modal-content-wrapper { flex-direction: column; max-height: 95vh; }
        }
    </style>
</head>
<body class="bg-white text-gray-800">

<header>
    <div class="logo" onclick="location.href='index.html'">ГАВР<span>САД</span></div>
    <nav class="nav-links" id="nav-links">
        <a href="index.html">ГЛАВНАЯ</a>
        <a href="shop.html">МАГАЗИН</a>
        <a href="services.html">УСЛУГИ</a>
        <a href="contacts.html">КОНТАКТЫ</a>
    </nav>
    <div class="header-actions">
        <a href="tel:+79932460921" class="hidden md:block font-bold text-[#2d5a27]">+7 (993) 246-09-21</a>
        <div class="cart-icon" onclick="toggleCart()">
            <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="Корзина">
            <span id="cart-count">0</span>
        </div>
        <div class="burger-menu" id="burger-menu">
            <span></span><span></span><span></span>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-6 md:py-12">
    <button id="back-to-categories" onclick="showCategories()" class="hidden mb-6 flex items-center text-gray-500 hover:text-lime-600 transition font-bold uppercase text-[10px] tracking-widest">
        ← Назад к категориям
    </button>
    <h1 id="page-title" class="text-xl md:text-3xl font-bold text-[#2d5a27] mb-6 md:mb-10 uppercase">Категории растений</h1>

    <div id="categories-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
        <div onclick="filterProducts('fruit', 'Плодовые деревья')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="5.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Плодовые деревья</h2></div>
        </div>
        <div onclick="filterProducts('fruit bushes', 'Плодовые кустарники')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="6.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Плодовые кустарники</h2></div>
        </div>
        <div onclick="filterProducts('strawberry', 'Клубника')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="7.png" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Клубника</h2></div>
        </div>
        <div onclick="filterProducts('bushes', 'Декоративные кустарнки')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="8.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Декоративные кустарники</h2></div>
        </div>
        <div onclick="filterProducts('coniferous', 'Хвойные')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="9.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Хвойные</h2></div>
        </div>
        <div onclick="filterProducts('flowers', 'Многолетние цветы')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="10.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Многолетние цветы</h2></div>
        </div>
        <div onclick="filterProducts('Roses', 'Розы')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="11.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Розы</h2></div>
        </div>
        <div onclick="filterProducts('hydrangeas', 'Гортензии')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="12.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Гортензии</h2></div>
        </div>
        <div onclick="filterProducts('mulch', 'Мульча')" class="relative h-40 md:h-52 overflow-hidden rounded-lg cursor-pointer group shadow-lg">
            <img src="13.jpg" class="w-full h-full object-cover transition duration-500">
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center"><h2 class="text-white text-lg font-bold uppercase tracking-widest">Мульча</h2></div>
        </div>
    </div>

    <div id="products-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6"></div>
</main>

<div id="product-modal" class="modal-overlay flex items-center justify-center">
    <div class="modal-content-wrapper">
        <div class="close-btn" onclick="closeProductModal()">&times;</div>
        <div class="flex flex-col md:flex-row h-full">
            <div class="md:w-1/2 h-64 md:h-auto bg-gray-100">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="md:w-1/2 p-6 md:p-8 flex flex-col">
                <p id="modal-latin" class="text-[9px] text-gray-400 uppercase italic mb-1"></p>
                <h2 id="modal-name" class="text-xl font-bold text-[#2d5a27] mb-4 uppercase"></h2>
                <div class="text-sm space-y-2 mb-6">
                    <p><b>Горшок:</b> <span id="modal-pot"></span></p>
                    <p><b>Статус:</b> <span id="modal-status"></span></p>
                    <div id="modal-desc" class="text-gray-600 leading-relaxed"></div>
                </div>
                <div class="mt-auto border-t pt-4">
                    <p id="modal-price" class="text-2xl font-bold mb-4"></p>
                    <button id="modal-add-btn" class="w-full bg-[#8bc34a] text-white py-4 font-bold uppercase tracking-widest hover:bg-green-600 transition">Добавить в корзину</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="cart-modal" class="modal-overlay">
    <div class="cart-panel">
        <div class="close-btn" onclick="toggleCart()">&times;</div>
        <div class="p-6 md:p-8 flex flex-col h-full">
            <h2 class="text-lg font-bold text-[#2d5a27] uppercase mb-6 border-b pb-2">Ваш заказ</h2>
            <div id="cart-items" class="space-y-4 mb-6 pr-2"></div>
            <div class="border-t pt-4 mb-6">
                <p class="text-lg font-bold flex justify-between text-[#2d5a27]">Итого: <span id="cart-total">0</span> ₽</p>
            </div>
            <form id="order-form" class="space-y-3">
                <input type="text" id="user-name" placeholder="Фамилия и Имя" required class="w-full border p-3 text-sm">
                <input type="tel" id="user-phone" placeholder="Номер телефона" required class="w-full border p-3 text-sm">
                <input type="email" id="user-email" placeholder="Email" required class="w-full border p-3 text-sm">
                <select id="delivery-method" onchange="updateDeliveryFields()" class="w-full border p-3 text-sm bg-gray-50">
                    <option value="самовывоз">Самовывоз (МО)</option>
                    <option value="курьер">Доставка курьером</option>
                    <option value="сдек">СДЭК / Почта</option>
                </select>
                <div id="address-fields" class="hidden">
                    <input type="text" id="user-address" placeholder="Адрес или ПВЗ" class="w-full border p-3 text-sm">
                </div>
                <select id="payment-method" class="w-full border p-3 text-sm bg-gray-50">
                    <option value="при получении">Оплата при получении</option>
                    <option value="СБП">Оплата онлайн (СБП)</option>
                </select>
                <button type="submit" class="w-full bg-[#8bc34a] text-white py-4 font-bold uppercase hover:bg-green-600 transition">Оформить заказ</button>
            </form>
        </div>
    </div>
</div>

<script>
    (function() { emailjs.init("sDpkySOMJAEq-WLWh"); })();

    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('gavrCart')) || []; 

    fetch('products.json')
        .then(res => res.json())
        .then(data => { 
            allProducts = data; 
            updateCartIcon();
        });

    function showCategories() {
        document.getElementById('categories-grid').classList.remove('hidden');
        document.getElementById('products-grid').classList.add('hidden');
        document.getElementById('back-to-categories').classList.add('hidden');
        document.getElementById('page-title').innerText = "Категории растений";
        window.scrollTo(0,0);
    }

    function filterProducts(categoryCode, categoryTitle) {
        const filtered = allProducts.filter(p => p.category === categoryCode);
        renderProducts(filtered, categoryTitle);
    }

    function renderProducts(products, title) {
        document.getElementById('categories-grid').classList.add('hidden');
        const prodGrid = document.getElementById('products-grid');
        prodGrid.classList.remove('hidden');
        document.getElementById('back-to-categories').classList.remove('hidden');
        document.getElementById('page-title').innerText = title;

        prodGrid.innerHTML = products.map(p => `
            <div class="bg-white border border-gray-100 rounded-lg overflow-hidden shadow-sm flex flex-col h-full">
                <div class="cursor-pointer" onclick="openProductModal(${p.id})">
                    <img src="${p.image}" class="w-full h-48 md:h-56 object-cover">
                    <div class="p-4 text-center">
                        <p class="text-[9px] text-gray-400 uppercase italic mb-1">${p.latinName || ''}</p>
                        <h3 class="font-bold text-[#2d5a27] mb-1 uppercase text-xs leading-tight">
                            ${p.name.includes('|') ? `${p.name.split('|')[0]}<br><span class="font-light opacity-80 text-[10px]">${p.name.split('|')[1]}</span>` : p.name}
                        </h3>
                        <p class="text-[10px] text-gray-500 mb-2 italic">Горшок: ${p.pot || '—'}</p>
                        <p class="text-base font-bold mb-4">${p.price} ₽</p>
                    </div>
                </div>
                <div class="p-4 pt-0 mt-auto flex flex-col space-y-2">
                    <div class="flex items-center justify-center space-x-3 mb-2">
                        <button onclick="changeQtyInGrid(${p.id}, -1)" class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-100">-</button>
                        <span id="qty-grid-${p.id}" class="text-sm font-bold">1</span>
                        <button onclick="changeQtyInGrid(${p.id}, 1)" class="w-8 h-8 rounded-full border border-gray-200 flex items-center justify-center hover:bg-gray-100">+</button>
                    </div>
                    <button onclick="addToCart(${p.id})" class="w-full bg-[#8bc34a] text-white py-3 text-[11px] font-bold uppercase hover:bg-green-600 transition">В КОРЗИНУ</button>
                </div>
            </div>
        `).join('');
        window.scrollTo(0,0);
    }

    function changeQtyInGrid(id, delta) {
        const el = document.getElementById(`qty-grid-${id}`);
        let current = parseInt(el.innerText);
        if (current + delta >= 1) el.innerText = current + delta;
    }

    function openProductModal(id) {
        const p = allProducts.find(item => item.id === id);
        if(!p) return;
        document.getElementById('modal-name').innerText = p.name.replace('|', ' ');
        document.getElementById('modal-latin').innerText = p.latinName || '';
        document.getElementById('modal-pot').innerText = p.pot || '—';
        document.getElementById('modal-status').innerText = p.status || 'под заказ';
        document.getElementById('modal-desc').innerHTML = p.description || 'Описание уточняется.';
        document.getElementById('modal-price').innerText = p.price + ' ₽';
        document.getElementById('modal-img').src = p.image;
        document.getElementById('modal-add-btn').onclick = () => { addToCart(p.id); closeProductModal(); };
        document.getElementById('product-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeProductModal() { 
        document.getElementById('product-modal').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    function toggleCart() { 
        const cartModal = document.getElementById('cart-modal');
        if(cartModal.style.display === 'flex') {
            cartModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        } else {
            cartModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            renderCart();
        }
    }

    function addToCart(productId) {
        const product = allProducts.find(p => p.id === productId);
        const qtyEl = document.getElementById(`qty-grid-${productId}`);
        const quantity = qtyEl ? parseInt(qtyEl.innerText) : 1;
        if (product) {
            const existing = cart.find(item => item.id === productId);
            if (existing) { existing.quantity += quantity; } else { cart.push({...product, quantity: quantity}); }
            localStorage.setItem('gavrCart', JSON.stringify(cart));
            updateCartIcon();
            if(qtyEl) qtyEl.innerText = 1;
            renderCart();
        }
    }

    function updateCartIcon() {
        document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        let total = 0;
        container.innerHTML = cart.map((item, index) => {
            total += item.price * item.quantity;
            return `<div class="flex justify-between items-center border-b border-gray-50 pb-4 text-xs">
                    <div class="flex-grow">
                        <p class="font-bold text-[#2d5a27] uppercase">${item.name}</p>
                        <div class="flex items-center space-x-2 mt-2">
                            <button onclick="changeCartQty(${index}, -1)" class="w-6 h-6 border rounded flex items-center justify-center">-</button>
                            <span class="font-bold">${item.quantity}</span>
                            <button onclick="changeCartQty(${index}, 1)" class="w-6 h-6 border rounded flex items-center justify-center">+</button>
                        </div>
                    </div>
                    <div class="text-right ml-4">
                        <p class="font-bold">${item.price * item.quantity} ₽</p>
                        <button onclick="removeFromCart(${index})" class="text-red-400 uppercase text-[9px]">✕</button>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = total;
    }

    function changeCartQty(index, delta) {
        if (cart[index].quantity + delta >= 1) cart[index].quantity += delta;
        else cart.splice(index, 1);
        localStorage.setItem('gavrCart', JSON.stringify(cart));
        renderCart(); updateCartIcon();
    }

    function removeFromCart(index) { 
        cart.splice(index, 1); 
        localStorage.setItem('gavrCart', JSON.stringify(cart));
        renderCart(); updateCartIcon(); 
    }

    function updateDeliveryFields() {
        const method = document.getElementById('delivery-method').value;
        document.getElementById('address-fields').className = (method === 'самовывоз') ? 'hidden' : 'block';
    }

    document.getElementById('order-form').onsubmit = async (e) => {
        e.preventDefault();
        const now = new Date();
        const orderNum = `GG-${now.getDate()}${now.getMonth()+1}-${Math.floor(Math.random() * 900) + 100}`;
        const token = "8496420537:AAGqpJo5g-6YOU6V41oinK6TOzOuSebuwxU"; 
        const chatId = "6414550624"; 
        const serviceID = "service_xvmjux7"; 
        const clientTemplate = "template_yrijit4"; 
        const adminTemplate = "template_uneryow";

        const uName = document.getElementById('user-name').value;
        const uEmail = document.getElementById('user-email').value;
        const uPhone = document.getElementById('user-phone').value;
        const delivery = document.getElementById('delivery-method').value;
        const addr = document.getElementById('user-address').value || 'Самовывоз';
        const total = document.getElementById('cart-total').innerText;
        const payment = document.getElementById('payment-method').value;

        const itemsList = cart.map(item => `• ${item.name} (${item.pot || '—'}) - ${item.quantity} шт. x ${item.price} ₽`).join('\n');
        
        const emailParams = {
            order_number: orderNum,
            user_name: uName,
            user_phone: uPhone, 
            user_email: uEmail,
            order_items: itemsList,
            total_price: total,
            delivery_info: `${delivery}. Адрес: ${addr}`,
            payment_method: payment
        };

        const botMessage = `📦 <b>ЗАКАЗ №${orderNum}</b>\n\n👤 <b>Клиент:</b> ${uName}\n📞 <b>Тел:</b> ${uPhone}\n📧 <b>Email:</b> ${uEmail}\n🚚 <b>Доставка:</b> ${delivery}\n📍 <b>Адрес:</b> ${addr}\n\n<b>ТОВАРЫ:</b>\n${itemsList}\n\n💰 <b>ИТОГО: ${total} ₽</b>\n💳 <b>Оплата:</b> ${payment}`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: botMessage, parse_mode: 'html' })
        });

        try {
            await Promise.all([
                emailjs.send(serviceID, clientTemplate, emailParams),
                emailjs.send(serviceID, adminTemplate, emailParams)
            ]);

            if (payment === 'СБП') {
                alert(`Заказ №${orderNum} оформлен. Переходим к оплате.`);
                cart = []; localStorage.removeItem('gavrCart');
                window.location.href = `https://finance.ozon.ru/apps/sbp/ozonbankpay/019d204c-8d0f-7765-bc01-58afc599a293?sum=${total}`;
            } else {
                alert(`Заказ №${orderNum} успешно оформлен!`);
                cart = []; localStorage.removeItem('gavrCart');
                updateCartIcon(); toggleCart(); e.target.reset();
            }
        } catch (err) {
            alert("Заказ оформлен! Мы перезвоним вам.");
            cart = []; localStorage.removeItem('gavrCart');
            updateCartIcon(); toggleCart();
        }
    };

    const burger = document.getElementById('burger-menu');
    const nav = document.getElementById('nav-links');
    burger.addEventListener('click', () => { nav.classList.toggle('active'); });
</script>
</body>
</html>
